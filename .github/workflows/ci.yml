name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint Python
        run: |
          uv run black --check src/ tests/
          uv run ruff check src/ tests/

      - name: Lint SQL
        run: uv run sqlfluff lint transform/models/

      - name: dbt deps
        run: uv run dbt deps --project-dir transform --profiles-dir transform

      - name: dbt compile (dev)
        run: |
          mkdir -p target
          uv run dbt compile --project-dir transform --profiles-dir transform --target dev

      - name: dbt parse (prod)
        env:
          DATABRICKS_HOST: "https://placeholder.azuredatabricks.net"
          DATABRICKS_HTTP_PATH: "/sql/1.0/warehouses/placeholder"
          DATABRICKS_TOKEN: "placeholder"
        run: |
          pip install --quiet "dbt-databricks>=1.9.0,<2.0.0"
          dbt deps --project-dir transform --profiles-dir transform
          dbt parse --project-dir transform --profiles-dir transform --target prod

      - name: Unit tests
        run: uv run pytest tests/unit/ -q

  integration:
    needs: lint-and-unit
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Integration tests
        run: uv run pytest tests/integration/ -q

  deploy:
    needs: lint-and-unit
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Sync Databricks Repo
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://adb-7405606237770298.18.azuredatabricks.net/api/2.0/repos/1166807278124877" \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -1)
          echo "HTTP $http_code: $body"
          [ "$http_code" -eq 200 ] || exit 1
