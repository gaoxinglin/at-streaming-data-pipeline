name: CI Pipeline
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Python formatting
        run: uv run black --check src/ tests/

      - name: Python lint
        run: uv run ruff check src/ tests/

      - name: dbt deps
        run: cd transform && uv run dbt deps

      - name: dbt compile
        run: cd transform && uv run dbt compile --profiles-dir .

      - name: SQL lint
        run: cd transform && uv run sqlfluff lint models/

      - name: Unit tests
        run: uv run pytest tests/ -v
