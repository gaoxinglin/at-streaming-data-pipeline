name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint Python
        run: |
          uv run black --check src/ tests/
          uv run ruff check src/ tests/

      - name: Lint SQL
        run: uv run sqlfluff lint transform/models/

      - name: dbt deps
        run: uv run dbt deps --project-dir transform --profiles-dir transform

      - name: dbt compile (dev)
        run: |
          mkdir -p target
          uv run dbt compile --project-dir transform --profiles-dir transform --target dev

      - name: dbt parse (prod)
        env:
          DATABRICKS_HOST: "https://placeholder.azuredatabricks.net"
          DATABRICKS_HTTP_PATH: "/sql/1.0/warehouses/placeholder"
          DATABRICKS_TOKEN: "placeholder"
        run: |
          pip install --quiet "dbt-databricks>=1.9.0,<2.0.0"
          dbt deps --project-dir transform --profiles-dir transform
          dbt parse --project-dir transform --profiles-dir transform --target prod

      - name: Unit tests
        run: uv run pytest tests/unit/ -q

  integration:
    needs: lint-and-unit
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Integration tests
        run: uv run pytest tests/integration/ -q

  deploy:
    needs: lint-and-unit
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Sync Databricks Repo
        env:
          DATABRICKS_HOST: "https://adb-7405617835144576.16.azuredatabricks.net"
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          repo_id=$(curl -sf "$DATABRICKS_HOST/api/2.0/repos" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" | \
            jq -r '.repos[] | select(.url | contains("at-streaming-data-pipeline")) | .id')
          [ -n "$repo_id" ] || { echo "ERROR: repo not found in workspace"; exit 1; }
          curl -sf -X PATCH "$DATABRICKS_HOST/api/2.0/repos/$repo_id" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
          echo "Synced repo $repo_id to main"
