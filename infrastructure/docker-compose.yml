services:
  redpanda:
    image: redpandadata/redpanda:v26.1.2
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      # Two listeners: EXTERNAL for host machine, INTERNAL for Docker network
      - --kafka-addr EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr EXTERNAL://localhost:9092,INTERNAL://redpanda:19092
      - --schema-registry-addr 0.0.0.0:8081
    ports:
      - "9092:9092"   # Host machine (for producer/consumer)
      - "19092:19092" # Docker internal network (for Console)
      - "8081:8081"

  redpanda-console:
    image: redpandadata/console:v3.7.1
    container_name: redpanda-console
    ports:
      - "8080:8080"
    volumes:
      - ./redpanda-console-config.yaml:/etc/redpanda-console/config.yaml
    environment:
      - CONFIG_FILEPATH=/etc/redpanda-console/config.yaml
    depends_on:
      - redpanda
