name: at_streaming
version: "0.1.0"

profile: at_streaming
config-version: 2

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]

clean-targets:
  - target
  - dbt_packages

seeds:
  at_streaming:
    gtfs_routes:
      +column_types:
        route_id: varchar
        agency_id: varchar
        route_short_name: varchar
        route_long_name: varchar
        route_desc: varchar
        route_type: integer
        route_url: varchar
        route_color: varchar
        route_text_color: varchar
        route_sort_order: varchar
        contract_id: varchar
    gtfs_stops:
      +column_types:
        stop_id: varchar
        stop_code: varchar
        stop_name: varchar
        stop_desc: varchar
        stop_lat: double
        stop_lon: double
        zone_id: varchar
        stop_url: varchar
        location_type: integer
        parent_station: varchar
        stop_timezone: varchar
        platform_code: varchar
        wheelchair_boarding: integer
        start_date: varchar
        end_date: varchar

models:
  at_streaming:
    staging:
      +materialized: view
    core:
      +materialized: table
    marts:
      +materialized: incremental
      +incremental_strategy: append
