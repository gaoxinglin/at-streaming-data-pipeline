at_streaming:
  target: dev

  outputs:
    dev:
      type: duckdb
      path: target/at_streaming.duckdb
      threads: 4

    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      schema: gold
      catalog: at_pipeline
      threads: 4
